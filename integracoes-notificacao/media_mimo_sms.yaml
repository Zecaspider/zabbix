zabbix_export:
  version: '6.0'
  media_types:
    - name: 'Mimo SMS'
      type: WEBHOOK
      description: |
        SMS via Mimo (Backbone, Lda — Luanda, Angola). Rota local, conexão
        direta com as operadoras angolanas. O BPC já figura como cliente do
        Mimo (mimo.it.ao) — verificar se há conta/sender ID existente.

        API: POST {mimo_host}/mimosms/v1/message/send?token={mimo_token}
        Corpo JSON: {"sender", "recipients", "text"}

        ATENÇÃO: a API HTTP não é documentada publicamente pela Backbone —
        endpoints levantados via biblioteca comunitária python-mimo-sms.
        Confirmar host, formato de resposta e ambiente de testes com
        suporte@backbone.it.ao / +244 943 33 33 33 antes de produção.

        Parâmetros a preencher: mimo_host, mimo_token, mimo_sender.
        Destino: campo "Send to" da media do usuário — aceita 9XXXXXXXX,
        2449XXXXXXXX ou +2449XXXXXXXX.

        Requer Zabbix 6.0+ e saída HTTPS do Zabbix server para o host Mimo.
      parameters:
        - name: sendto
          value: '{ALERT.SENDTO}'
        - name: subject
          value: '{ALERT.SUBJECT}'
        - name: message
          value: '{ALERT.MESSAGE}'
        - name: mimo_host
          value: 'https://www.mimo.it.ao'
        - name: mimo_token
          value: '<PREENCHER_TOKEN_MIMO>'
        - name: mimo_sender
          value: '<PREENCHER_SENDER_ID>'
      script: |
        // Mimo SMS — webhook Zabbix (Duktape/ES5, Zabbix 6.0+)

        function normalize(number) {
            var n = String(number).replace(/[\s\-\+\.]/g, '');
            if (n.indexOf('00244') === 0) {
                n = n.substring(2);
            }
            if (n.indexOf('244') !== 0) {
                n = '244' + n;
            }
            if (!/^244\d{9}$/.test(n)) {
                throw 'numero de destino invalido: "' + number + '"';
            }
            return n;
        }

        function truncate(text, max) {
            text = String(text);
            return text.length > max ? text.substring(0, max - 3) + '...' : text;
        }

        try {
            var params = JSON.parse(value);

            if (!params.sendto) {
                throw 'parametro "sendto" vazio — defina o numero no campo "Send to" da media do usuario';
            }
            if (!params.mimo_token || params.mimo_token.indexOf('<PREENCHER') === 0) {
                throw 'mimo_token nao configurado no media type';
            }

            var text = truncate((params.subject ? params.subject + ' | ' : '') + params.message, 160),
                host = String(params.mimo_host).replace(/\/+$/, ''),
                url = host + '/mimosms/v1/message/send?token=' + encodeURIComponent(params.mimo_token),
                payload = {
                    sender: params.mimo_sender,
                    recipients: normalize(params.sendto),
                    text: text
                },
                request = new HttpRequest();

            request.addHeader('Content-Type: application/json');

            var response = request.post(url, JSON.stringify(payload)),
                status = request.getStatus();

            Zabbix.log(4, '[Mimo SMS] HTTP ' + status + ' resposta: ' + response);

            if (status < 200 || status >= 300) {
                throw 'Mimo HTTP ' + status + ': ' + response;
            }

            // A API pode devolver 200 com erro no corpo — validar na homologacao
            // com a Backbone e endurecer esta verificacao conforme a resposta real.
            return 'enviado via Mimo (HTTP ' + status + ')';
        }
        catch (error) {
            Zabbix.log(3, '[Mimo SMS] envio falhou: ' + error);
            throw 'Mimo SMS: ' + error;
        }
      timeout: 30s
      attempts: '3'
      attempt_interval: 30s
      max_sessions: '1'
      message_templates:
        - event_source: TRIGGERS
          operation_mode: PROBLEM
          subject: ''
          message: 'PROBLEMA {EVENT.SEVERITY}: {EVENT.NAME} em {HOST.NAME} as {EVENT.TIME} de {EVENT.DATE}'
        - event_source: TRIGGERS
          operation_mode: RECOVERY
          subject: ''
          message: 'RESOLVIDO: {EVENT.NAME} em {HOST.NAME} (duracao {EVENT.DURATION})'
        - event_source: TRIGGERS
          operation_mode: UPDATE
          subject: ''
          message: 'UPDATE por {USER.FULLNAME}: {EVENT.NAME} em {HOST.NAME}. {EVENT.UPDATE.MESSAGE}'
