<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Topologia DC BPC — hosts Zabbix e links, auditada 2026-06-18</title>
<desc>Diagrama spine-leaf com nomes e hostids reais do Zabbix. Caixas cheias sao hosts monitorizados; pilulas tracejadas sao links/providers que vivem em interfaces. Os 3 ISR4451 ligam ao vPC-B (LEAF-103/104); WAN-AG ao vPC-A (LEAF-101/102); SPINEs em full-mesh com todos os LEAFs; LEAF-105 standalone; GTW01 com Po1 em baixo.</desc>

<rect x="40" y="40" width="600" height="50" rx="7" fill="#F1EFE8" stroke="#D3D1C7"/>
<text x="52" y="61" font-size="11" fill="#2C2C2A"><tspan font-weight="500">Caixa cheia</tspan> = host no Zabbix (com hostid)   ·   <tspan font-weight="500">pilula tracejada</tspan> = link / provider (vive numa interface, nao e host)</text>
<text x="52" y="80" font-size="11" fill="#5F5E5A">Traducao: SPINE = nucleo/backbone · LEAF = onde tudo liga (acesso+distribuicao) · Po = EtherChannel/trunk · vPC = 2 switches como 1 (tipo stack)</text>

